#user  nobody;

#testskdkfsjdfkjaklsdjfkl;asjdfl;kajsd;fjkas;dfjasdkfjkl;asjdfl;jasdf;kl

user root root;
worker_processes 1;

error_log on;
error_log /opt/zlm_media_server/logs/nginx_error.log;

# error_log off;
# error_log /opt/nginx/logs/ng_error.log;
#error_log  /tmp/ng_notic_error.log  notice;
#error_log  /tmp/ng_info_error.log  info;
#error_log      /dev/null crit;
#error_log   /tmp/nginx_error.log error;

# pid /tmp/nginx.pid;


events {
    worker_connections 1024;
}

http {
    include mime.types;
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
    add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
    add_header Access-Control-Allow-Credentials 'true';
    default_type application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log         /tmp/access.log  main;
    sendfile on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout 65;

    #gzip  on;

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # server {
    #     listen 18099;
    #     server_name localhost;
    #     location / {
    #         root "/var/www/html";
    #         index index.html;
    #     }
    # }
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }


    # === 国标服务器系统 HTTP 入口（80） ===
    server {
        listen 80;
        server_name _;

        # 前端静态页面根目录（Vue 打包后覆盖）
        root /home/***/coder/gb_service2022/frontend/dist;
        index index.html;


         location ~* \.wasm$ {
            add_header Content-Type application/wasm;
        }

        # 前端 SPA 路由：除了 /api/、/zlm/ 外都交给前端
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 后端 API：转发到 C++ 后端 8080
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            proxy_buffering on;
            proxy_buffer_size 128;
            proxy_hide_header Content-Length;
        }

        # 可选：ZLMediaKit 播放流统一走 nginx（转发到 880）
        location /zlm/ {
            proxy_pass http://127.0.0.1:880/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
        }
    }
}
